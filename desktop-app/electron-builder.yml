appId: com.habcreative.desktop
productName: "HAB Creative"
directories:
  output: dist
  buildResources: assets

files:
  - main.js
  - preload.js
  - inject.js
  - package.json
  - assets/**

win:
  target:
    - nsis
    - portable
  icon: assets/icon.ico

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true

mac:
  target:
    - dmg
    - zip
  icon: assets/icon.icns
  category: public.app-category.productivity

linux:
  target:
    - AppImage
    - deb
  icon: assets/icon.png

publish:
  - provider: github
    releaseType: release
