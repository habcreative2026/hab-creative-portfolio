name: Test MacOS DMG on ARM64

on:
  workflow_dispatch:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test-macos-dmg:
    name: Test DMG on MacOS ARM64
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: desktop-app/package-lock.json

      - name: Install dependencies
        run: npm install
        working-directory: desktop-app

      - name: Build DMG for ARM64
        run: npm run build:mac:arm64
        working-directory: desktop-app
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: List built files
        run: ls -la desktop-app/dist/

      - name: Mount DMG file
        run: |
          # Tìm file .dmg
          DMG_FILE=$(ls desktop-app/dist/*.dmg | head -1)
          echo "DMG_FILE=$DMG_FILE" >> $GITHUB_ENV

          # Mount DMG
          hdiutil attach "$DMG_FILE" -mountpoint /Volumes/HABCreative
          echo "DMG mounted successfully"

      - name: Copy app from DMG to Applications
        run: |
          # Copy app từ DMG vào Applications
          cp -R /Volumes/HABCreative/*.app /Applications/
          echo "App copied to Applications"

      - name: Remove quarantine attribute
        run: |
          sudo xattr -rd com.apple.quarantine /Applications/HAB\ Creative.app
          echo "Quarantine removed"

      - name: Test app - Copy function
        run: |
          # Mở app và test copy
          open /Applications/HAB\ Creative.app &
          sleep 5

          # Kiểm tra app đang chạy
          if pgrep -f "HAB Creative"; then
            echo "App is running"
          else
            echo "App failed to start"
            exit 1
          fi

      - name: Unmount DMG
        if: always()
        run: |
          hdiutil detach /Volumes/HABCreative || true

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm64-dmg
          path: desktop-app/dist/*.dmg
          retention-days: 7
