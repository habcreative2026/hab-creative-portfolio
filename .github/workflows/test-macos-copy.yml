name: Test Copy on MacOS

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test-macos:
    name: Test on MacOS
    runs-on: macos-latest

    defaults:
      run:
        working-directory: desktop-app

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: desktop-app/package-lock.json

      - name: Install dependencies
        run: npm install # 👈 Đổi từ npm ci thành npm install

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: Run copy tests
        run: npx playwright test tests/copy-macos.spec.js

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: desktop-app/playwright-report/
